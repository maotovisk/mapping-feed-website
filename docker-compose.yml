services:
  mapping-feed-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: ${PORT:-3000}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-https://api.your-domain.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
