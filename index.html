<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>osu! Mapping Feed - Real-Time Mapping Events</title>
    <meta
      name="description"
      content="Track real-time osu! mapping activity with map status updates, nominations, rank changes, and group movements in one fast live feed."
    />
    <meta
      name="keywords"
      content="osu, osu!, mapping feed, beatmap ranking, nominations, disqualifications, mapping events"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="mapping-feed" />
    <meta name="application-name" content="osu! Mapping Feed" />
    <meta name="theme-color" content="#050b1a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      html,
      body {
        margin: 0;
        background-color: #02050d;
        background-image: linear-gradient(180deg, #02050d 0%, #040b19 52%, #030815 100%);
        color-scheme: dark;
      }

      #app {
        min-height: 100%;
        background: transparent;
      }
    </style>

    <link rel="canonical" href="https://mappingfeed.maot.dev/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/feed.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="osu! Mapping Feed" />
    <meta property="og:title" content="osu! Mapping Feed - Real-Time Mapping Events" />
    <meta
      property="og:description"
      content="Track real-time osu! mapping activity with map and group event filters."
    />
    <meta property="og:url" content="https://mappingfeed.maot.dev/" />
    <meta property="og:image" content="https://mappingfeed.maot.dev/feed.svg" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="osu! Mapping Feed logo" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="osu! Mapping Feed - Real-Time Mapping Events" />
    <meta
      name="twitter:description"
      content="Track real-time osu! mapping activity with map and group event filters."
    />
    <meta name="twitter:image" content="https://mappingfeed.maot.dev/feed.svg" />

    <script>
      (() => {
        const currentUrl = `${window.location.origin}${window.location.pathname}`;
        const canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) {
          canonical.setAttribute("href", currentUrl);
        }

        const ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) {
          ogUrl.setAttribute("content", currentUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
